<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>STSU Digital TMR</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import {
  getAuth,onAuthStateChanged,
  signInWithEmailAndPassword,signOut
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import {
  getDatabase,ref,get,set,push,remove,
  runTransaction
} from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

/* ================= FIREBASE CONFIG ================= */
/* GANTI DENGAN PUNYA KAMU */
const firebaseConfig = {
  apiKey: "ISI_APIKEY",
  authDomain: "ISI_AUTHDOMAIN",
  databaseURL: "ISI_DATABASEURL",
  projectId: "ISI_PROJECTID",
  storageBucket: "ISI_BUCKET",
  messagingSenderId: "ISI_MSGID",
  appId: "ISI_APPID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let user=null;
let role="admin";

const $ = id=>document.getElementById(id);

/* ================= FORMAT RUPIAH ================= */
function formatRp(n){
  return new Intl.NumberFormat("id-ID").format(n||0);
}
function parseRp(v){
  return parseInt(String(v).replace(/\D/g,''))||0;
}
window.formatInput=(e)=>{
  const val=parseRp(e.value);
  e.value=formatRp(val);
}

/* ================= AUTH ================= */
onAuthStateChanged(auth,async(u)=>{
  if(!u){
    $("loginBox").style.display="block";
    $("appBox").style.display="none";
    return;
  }
  user=u;
  const snap=await get(ref(db,"users/"+u.uid));
  role=snap.val()?.role||"admin";
  $("roleText").innerText=role;
  $("loginBox").style.display="none";
  $("appBox").style.display="block";
  loadDashboard();
});

window.login=async()=>{
  await signInWithEmailAndPassword(auth,$("email").value,$("pass").value);
}
window.logout=async()=>{ await signOut(auth); }

/* ================= COUNTER ================= */
async function nextSeq(jenis,tgl){
  const year=tgl.split("-")[0];
  const r=ref(db,"counters/"+year+"/"+jenis+"/seq");
  const res=await runTransaction(r,(cur)=>{
    if(cur==null) return 1;
    return cur+1;
  });
  return res.snapshot.val();
}

/* ================= SAVE ================= */
window.saveStsu=async()=>{
  const jenis=$("jenis").value;
  const tgl=$("tgl").value;
  if(!tgl) return alert("Tanggal wajib diisi");

  const nominal=parseRp($("nominal").value);
  if(nominal<=0) return alert("Nominal harus > 0");

  const seq=await nextSeq(jenis,tgl);
  const no=seq+"/"+tgl;

  const id=push(ref(db,"stsu/"+user.uid)).key;

  const data={
    id,
    uid:user.uid,
    jenis,
    tgl,
    nominal,
    noStsu:no,
    status:"DRAFT",
    createdAt:Date.now()
  };

  await set(ref(db,"stsu/"+user.uid+"/"+id),data);
  await set(ref(db,"stsu_index/"+user.uid+"/"+id),data);

  alert("Tersimpan");
  $("nominal").value="";
  loadDashboard();
}

/* ================= DASHBOARD ================= */
async function loadDashboard(){
  let arr=[];
  if(role==="admin"){
    const snap=await get(ref(db,"stsu_index"));
    const val=snap.val()||{};
    Object.values(val).forEach(u=>{
      Object.values(u).forEach(x=>arr.push(x));
    });
  }else{
    const snap=await get(ref(db,"stsu_index/"+user.uid));
    arr=Object.values(snap.val()||{});
  }
  arr.sort((a,b)=>b.createdAt-a.createdAt);
  renderDash(arr);
}

function renderDash(arr){
  const box=$("dash");
  box.innerHTML="";
  arr.forEach(x=>{
    box.innerHTML+=`
    <div style="border:1px solid #ddd;padding:10px;margin:5px;border-radius:8px">
      <b>${x.noStsu}</b><br>
      ${x.jenis} | ${x.tgl}<br>
      Rp ${formatRp(x.nominal)}<br>
      <button onclick="deleteStsu('${x.uid}','${x.id}')">Delete</button>
    </div>`;
  });
}

/* ================= DELETE ================= */
window.deleteStsu=async(uid,id)=>{
  if(!confirm("Hapus data?")) return;
  await remove(ref(db,"stsu/"+uid+"/"+id));
  await remove(ref(db,"stsu_index/"+uid+"/"+id));
  loadDashboard();
}
</script>
</head>

<body style="font-family:Arial;padding:20px;background:#f5f5f5">

<div id="loginBox">
  <h2>Login STSU</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="pass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="appBox" style="display:none">
  <h2>STSU Digital (Role: <span id="roleText"></span>)</h2>
  <button onclick="logout()">Logout</button>
  <hr>

  <h3>Buat STSU</h3>
  <select id="jenis">
    <option value="retribusi">Retribusi</option>
    <option value="lainnya">Lainnya</option>
  </select><br><br>
  <input type="date" id="tgl"><br><br>
  <input id="nominal" oninput="formatInput(this)" placeholder="Nominal"><br><br>
  <button onclick="saveStsu()">Simpan</button>

  <hr>
  <h3>Dashboard</h3>
  <div id="dash"></div>
</div>

</body>
</html>
