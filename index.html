<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STSU Digital</title>
  <style>
    :root{
      --bg:#f6f8fb; --card:#fff; --text:#0f172a; --muted:#64748b;
      --border:#e2e8f0; --primary:#0f172a; --shadow:0 10px 25px rgba(2,8,23,.08);
      --radius:16px; --ok:#16a34a; --danger:#b91c1c;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
    .topbar .inner{max-width:1100px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:38px;height:38px;border-radius:12px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900}
    .title b{display:block;font-size:14px;line-height:1.1}
    .title span{display:block;font-size:12px;color:var(--muted)}
    .nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{appearance:none;border:1px solid var(--border);background:#fff;color:var(--text);padding:9px 12px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
    .btn:hover{background:#f8fafc}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.primary:hover{opacity:.92}
    .btn.small{padding:7px 10px;border-radius:10px;font-size:12px}
    .btn.danger{border-color:#fecaca;background:#fff;color:var(--danger)}
    .grid{display:grid;gap:14px}
    .grid.two{grid-template-columns:1fr}
    @media(min-width:900px){.grid.two{grid-template-columns:1.35fr .65fr}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .card .hd h2,.card .hd h3{margin:0;font-size:15px}
    .card .hd p{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .card .bd{padding:14px 16px}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:12px;outline:none;font-size:14px;background:#fff}
    textarea{min-height:92px;resize:vertical}
    .row{display:grid;gap:10px}
    .row.two{grid-template-columns:1fr}
    @media(min-width:700px){.row.two{grid-template-columns:1fr 1fr}}
    .muted{color:var(--muted);font-size:12px}
    .badge{display:inline-flex;align-items:center;font-size:12px;font-weight:900;padding:3px 10px;border-radius:999px;border:1px solid var(--border);background:#f8fafc}
    .badge.final{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .badge.draft{background:#f1f5f9;border-color:#e2e8f0;color:#334155}
    .hr{height:1px;background:var(--border);margin:12px 0}
    .section{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#fff;margin-top:12px}
    .section .shd{padding:10px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;background:#f8fafc;border-bottom:1px solid var(--border)}
    .section .shd b{font-size:13px}
    .switch{width:44px;height:26px;border-radius:999px;background:#e2e8f0;position:relative;cursor:pointer;flex:0 0 auto;border:1px solid #cbd5e1}
    .switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:999px;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.15);transition:all .18s ease}
    .switch.on{background:var(--ok);border-color:var(--ok)}
    .switch.on::after{left:21px}
    .tbl{width:100%;border-collapse:collapse}
    .tbl th,.tbl td{border-top:1px solid var(--border);padding:10px 10px;font-size:13px;vertical-align:middle}
    .tbl th{color:var(--muted);font-size:12px;text-align:left}
    .right{text-align:right}
    .inline{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .totbox{border:1px dashed #cbd5e1;border-radius:14px;padding:12px;background:#fafcff}
    .totline{display:flex;justify-content:space-between;gap:10px;align-items:flex-end}
    .totline b{font-size:16px}
    .rightbox .card{position:sticky;top:76px}
    @media print{
      .no-print{display:none !important}
      body{background:#fff}
      .wrap{max-width:none;padding:0}
      .card{border:none;box-shadow:none;border-radius:0}
      .section{border:1px solid #cbd5e1}
    }
    @page{size:A4;margin:20mm}

    /* ===== Surat Preview (A4) ===== */
    .surat h1{text-align:center;font-size:15px;letter-spacing:.6px;margin:0}
    .surat .nomor{text-align:center;margin-top:6px;font-size:13px}

    /* Rapatkan supaya hemat halaman */
    .surat .p{font-size:12.6px;line-height:1.38;margin:8px 0}

    /* Tabel lebih rapat */
    .surat .tabel{width:100%;border-collapse:collapse;margin-top:6px}
    .surat .tabel td{border-top:1px solid #cbd5e1;padding:5px 8px;font-size:12.6px}

    /* Angka item dibuat lebih kiri (geser dari kanan) */
    .surat .tabel td.r{
      text-align:right;
      font-variant-numeric:tabular-nums;
      padding-right:120px; /* item angka lebih kiri */
    }

    /* Baris subtotal: angka lebih kanan & bold */
  .surat .subline{
  text-align:right;              /* ✅ semua rata kanan */
  margin:6px 0 10px;
  font-size:12.6px;
  font-weight:900;
  font-variant-numeric:tabular-nums;
}

    .surat .total{border-top:1px solid #0f172a;margin-top:12px;padding-top:10px}
    .surat .ttdgrid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:22px}
    .surat .ttd{text-align:center;font-size:13px}
    .surat .spacer{height:70px}
  </style>
</head>
<body>
  <div class="topbar no-print">
    <div class="inner">
      <div class="brand">
        <div class="logo">SU</div>
        <div class="title">
          <b>Sistem STSU Digital</b>
          <span>TMR • Modern tapi tetap resmi</span>
        </div>
      </div>
      <div class="nav">
        <button class="btn" onclick="go('dashboard')">Dashboard</button>
        <button class="btn" onclick="go('buat')">Buat STSU</button>
        <button class="btn" onclick="go('settings')">Settings</button>
      </div>
    </div>
  </div>

  <div class="wrap" id="app"></div>

<script>
/* ===================== Utils ===================== */
const MONTHS_ID=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
function rupiah(n){return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(Number(n||0));}
function ymdToIndo(ymd){ if(!ymd) return "..............."; const [y,m,d]=ymd.split("-"); return `${Number(d)} ${MONTHS_ID[Number(m)-1]} ${y}`; }
function numOnly(v){ return Number(String(v||"0").replace(/[^\d]/g,""))||0; }
function sum(arr){ return arr.reduce((a,b)=>a+Number(b||0),0); }
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
    .replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function dayNameID(ymd){
  if(!ymd) return "";
  const d=new Date(ymd+"T00:00:00");
  return d.toLocaleDateString("id-ID",{weekday:"long"});
}

// TERBILANG (ID)
function terbilangID(n){
  n = Math.floor(Number(n||0));
  if(n === 0) return "Nol rupiah";

  const satuan = ["", "satu", "dua", "tiga", "empat", "lima", "enam", "tujuh", "delapan", "sembilan", "sepuluh", "sebelas"];
  function toWords(x){
    x = Math.floor(x);
    if(x < 12) return satuan[x];
    if(x < 20) return `${toWords(x-10)} belas`;
    if(x < 100) return `${toWords(Math.floor(x/10))} puluh${x%10 ? " " + toWords(x%10) : ""}`;
    if(x < 200) return `seratus${x-100 ? " " + toWords(x-100) : ""}`;
    if(x < 1000) return `${toWords(Math.floor(x/100))} ratus${x%100 ? " " + toWords(x%100) : ""}`;
    if(x < 2000) return `seribu${x-1000 ? " " + toWords(x-1000) : ""}`;
    if(x < 1000000) return `${toWords(Math.floor(x/1000))} ribu${x%1000 ? " " + toWords(x%1000) : ""}`;
    if(x < 1000000000) return `${toWords(Math.floor(x/1000000))} juta${x%1000000 ? " " + toWords(x%1000000) : ""}`;
    if(x < 1000000000000) return `${toWords(Math.floor(x/1000000000))} miliar${x%1000000000 ? " " + toWords(x%1000000000) : ""}`;
    return `${toWords(Math.floor(x/1000000000000))} triliun${x%1000000000000 ? " " + toWords(x%1000000000000) : ""}`;
  }

  const kal = toWords(n).trim();
  const cap = kal.charAt(0).toUpperCase() + kal.slice(1);
  return `${cap} rupiah`;
}

/* ===================== Storage ===================== */
const LS={
  get(k,d){ try{const v=localStorage.getItem(k); return v?JSON.parse(v):d;}catch{return d;} },
  set(k,v){ localStorage.setItem(k,JSON.stringify(v)); }
};

const DEFAULT_SIGNERS={
  kepala:{ nama:"NAMA KEPALA SEKSI", jabatan:"Kepala Seksi Pelayanan & Informasi" },
  bendahara:{ nama:"NAMA BENDAHARA", jabatan:"Bendahara Penerimaan" },
};
function loadSettings(){ return LS.get("stsu_settings",{signers:DEFAULT_SIGNERS}); }
function saveSettings(s){ LS.set("stsu_settings",s); }

function loadDB(){ return LS.get("stsu_db",{items:[]}); }
function saveDB(db){ LS.set("stsu_db",db); }

function loadCounters(){ return LS.get("stsu_counters",{byYear:{}}); }
function saveCounters(c){ LS.set("stsu_counters",c); }

/* ===================== Templates ===================== */
const TEMPLATE_ETICKETING=[
  "Dewasa","Anak","Rombongan Dewasa","Rombongan Anak","Taman Satwa Anak","Pusat Primata",
  "H. Biasa Dewasa","H. Biasa Anak","Kendaraan Gol 1","Kendaraan Gol 2","Kendaraan Gol 3","Motor","Sepeda"
];
function makeTemplateItems(){ return TEMPLATE_ETICKETING.map(k=>({kategori:k, nominal:0})); }

function defaultSections(){
  return [
    { id:crypto.randomUUID(), key:"fasilitas", title:"Pemakaian Fasilitas", note:"fleksibel (sesuai pemakaian hari itu)", enabled:true, items:[] },
    { id:crypto.randomUUID(), key:"eticket", title:"E-ticketing", note:"template sama seperti e-ticketing", enabled:true, items:makeTemplateItems() },
    { id:crypto.randomUUID(), key:"online", title:"Tiket Online", note:"template sama seperti e-ticketing", enabled:true, items:makeTemplateItems() },
    { id:crypto.randomUUID(), key:"vending", title:"Vending Machine", note:"template sama seperti e-ticketing", enabled:true, items:makeTemplateItems() },
    { id:crypto.randomUUID(), key:"newgate", title:"New Gate", note:"template sama seperti e-ticketing", enabled:true, items:makeTemplateItems() },
    { id:crypto.randomUUID(), key:"susulan", title:"Susulan / Validasi", note:"template sama seperti e-ticketing", enabled:true, items:makeTemplateItems() },
  ];
}

/* ===================== Numbering (based on TANGGAL TRANSAKSI) ===================== */
function nextNumber(jenis, tanggalTransaksiYMD){
  const year = tanggalTransaksiYMD.slice(0,4);
  const dd = tanggalTransaksiYMD.slice(8,10);
  const mm = tanggalTransaksiYMD.slice(5,7);

  const c = loadCounters();
  if(!c.byYear[year]) c.byYear[year] = { RETRIBUSI:0, LAINNYA:0 };
  c.byYear[year][jenis] = (c.byYear[year][jenis]||0) + 1;
  saveCounters(c);

  const n = c.byYear[year][jenis];
  if(jenis==="RETRIBUSI") return `${n}/${dd}/${mm}/SU/${year}`;
  return `${n}/${dd}/${mm}/SU/L/${year}`;
}

/* ===================== State / Router ===================== */
const STATE={ route:"dashboard", editingId:null, previewId:null };
function go(route){ STATE.route=route; STATE.editingId=null; STATE.previewId=null; render(); }
function el(id){ return document.getElementById(id); }

/* ===================== Compute totals ===================== */
function sectionSubtotal(section){
  if(!section.enabled) return 0;
  return sum((section.items||[]).map(it=>Number(it.nominal||0)));
}
function computeTotal(doc){
  if(doc.jenis==="LAINNYA") return Number(doc.nominalLainnya||0);
  return sum((doc.sections||[]).filter(s=>s.enabled).map(s=>sectionSubtotal(s)));
}

/* ===================== UI ===================== */
function render(){
  const app = el("app");
  if(STATE.route==="dashboard") return renderDashboard(app);
  if(STATE.route==="buat") return renderBuat(app);
  if(STATE.route==="settings") return renderSettings(app);
  if(STATE.route==="preview") return renderPreview(app);
}

/* Dashboard */
function renderDashboard(app){
  const db=loadDB();
  const items=[...db.items].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  app.innerHTML=`
    <div class="grid two">
      <div class="card">
        <div class="hd">
          <div>
            <h2>Dashboard</h2>
            <p>Daftar STSU tersimpan (lokal browser). Nanti bisa disambung ke Firebase.</p>
          </div>
          <span class="badge">${items.length} dokumen</span>
        </div>
        <div class="bd">
          <div class="inline no-print" style="justify-content:space-between">
            <div class="muted">Klik “Preview” untuk cetak PDF.</div>
            <button class="btn primary" onclick="go('buat')">+ Buat STSU</button>
          </div>

          <div style="margin-top:12px; overflow:auto">
            <table class="tbl">
              <thead>
                <tr>
                  <th>Nomor</th>
                  <th>Tgl Transaksi</th>
                  <th>Tgl STSU/TTD</th>
                  <th>Jenis</th>
                  <th class="right">Total</th>
                  <th>Status</th>
                  <th class="no-print">Aksi</th>
                </tr>
              </thead>
              <tbody>
                ${items.length ? items.map(x=>`
                  <tr>
                    <td><b>${escapeHtml(x.nomor||"(belum disimpan)")}</b></td>
                    <td>${escapeHtml(ymdToIndo(x.tanggalTransaksi))}</td>
                    <td>${escapeHtml(ymdToIndo(x.tanggalTTD))}</td>
                    <td><span class="badge">${escapeHtml(x.jenis)}</span></td>
                    <td class="right">${rupiah(x.total||0)}</td>
                    <td>${x.status==="FINAL" ? `<span class="badge final">FINAL</span>` : `<span class="badge draft">DRAFT</span>`}</td>
                    <td class="no-print">
                      <button class="btn small" onclick="editDoc('${x.id}')">Edit</button>
                      <button class="btn small" onclick="openPreview('${x.id}')">Preview</button>
                      <button class="btn small danger" onclick="deleteDoc('${x.id}')">Hapus</button>
                    </td>
                  </tr>
                `).join("") : `<tr><td colspan="7" class="muted" style="padding:14px">Belum ada data.</td></tr>`}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="rightbox">
        <div class="card">
          <div class="hd"><div><h3>Ringkasan</h3><p>Otomatis dari data tersimpan</p></div></div>
          <div class="bd">
            ${renderSummary(items)}
            <div class="hr"></div>
            <div class="muted">Catatan: sekarang masih localStorage. Setelah UI final, baru kita sambungkan ke Firebase agar multi-user.</div>
          </div>
        </div>
      </div>
    </div>
  `;
}
function renderSummary(items){
  const totalR=sum(items.filter(x=>x.jenis==="RETRIBUSI").map(x=>x.total||0));
  const totalL=sum(items.filter(x=>x.jenis==="LAINNYA").map(x=>x.total||0));
  const total=totalR+totalL;
  return `
    <div class="totbox">
      <div class="totline"><div class="muted">Total Retribusi</div><span>${rupiah(totalR)}</span></div>
      <div class="totline" style="margin-top:6px"><div class="muted">Total Lainnya</div><span>${rupiah(totalL)}</span></div>
      <div class="hr"></div>
      <div class="totline"><b>Total Keseluruhan</b><b>${rupiah(total)}</b></div>
    </div>
  `;
}

/* Buat/Edit */
function renderBuat(app){
  const settings=loadSettings();
  const db=loadDB();
  let doc=null;

  if(STATE.editingId){
    doc=db.items.find(x=>x.id===STATE.editingId)||null;
  }
  if(!doc){
    const today=new Date().toISOString().slice(0,10);
    doc={
      id:crypto.randomUUID(),
      jenis:"RETRIBUSI",
      tanggalTransaksi:today,   // WAJIB (untuk nomor)
      tanggalTTD:"",            // OPSIONAL (untuk Jakarta, ...)
      status:"DRAFT",
      nomor:"",
      uraian:"",
      nominalLainnya:0,
      sections:defaultSections(),
      signers:JSON.parse(JSON.stringify(settings.signers)),
      createdAt:Date.now(),
      updatedAt:Date.now(),
    };
  }

  doc.total=computeTotal(doc);

  app.innerHTML=`
    <div class="grid two">
      <div class="card">
        <div class="hd">
          <div>
            <h2>${STATE.editingId ? "Edit STSU" : "Buat STSU"}</h2>
            <p>Nomor STSU dibuat dari <b>Tanggal Transaksi</b>. Tanggal STSU/TTD bisa diisi belakangan.</p>
          </div>
          <span class="badge ${doc.status==="FINAL"?"final":"draft"}">${doc.status}</span>
        </div>
        <div class="bd">
          <div class="row two">
            <div>
              <label>Jenis</label>
              <select id="jenis">
                <option value="RETRIBUSI" ${doc.jenis==="RETRIBUSI"?"selected":""}>Retribusi</option>
                <option value="LAINNYA" ${doc.jenis==="LAINNYA"?"selected":""}>Lainnya</option>
              </select>
            </div>
            <div>
              <label>Tanggal Transaksi (wajib)</label>
              <input id="tglTrans" type="date" value="${doc.tanggalTransaksi}">
              <div class="muted">Dipakai untuk nomor STSU & penutup (Retribusi).</div>
            </div>
          </div>

          <div class="row two" style="margin-top:10px">
            <div>
              <label>Tanggal STSU / TTD (boleh kosong saat draft)</label>
              <input id="tglTTD" type="date" value="${escapeHtml(doc.tanggalTTD||"")}">
              <div class="muted">Dipakai di bagian: “Jakarta, …”</div>
            </div>
            <div>
              <label>Nomor STSU</label>
              <input value="${escapeHtml(doc.nomor||"(dibuat saat Simpan pertama kali)")}" disabled>
              <div class="muted">Counter reset per tahun, lanjut terus.</div>
            </div>
          </div>

          <div id="formArea" style="margin-top:10px"></div>

          <div class="hr"></div>
          <div class="inline no-print" style="justify-content:flex-end">
            <button class="btn" onclick="go('dashboard')">Kembali</button>
            <button class="btn primary" onclick="saveDoc()">Simpan</button>
            <button class="btn" onclick="openPreviewCurrent()">Preview</button>
            <button class="btn danger" onclick="finalizeDoc()">Finalkan</button>
          </div>
        </div>
      </div>

      <div class="rightbox">
        <div class="card">
          <div class="hd"><div><h3>Ringkasan</h3><p>Total + per-section subtotal</p></div></div>
          <div class="bd">
            <div class="totbox">
              <div class="totline"><div class="muted">Total</div><b id="sumTotal">${rupiah(doc.total)}</b></div>
              <div class="totline" style="margin-top:6px"><div class="muted">Terbilang</div><span id="sumTerbilang">${escapeHtml(terbilangID(doc.total))}</span></div>
              ${doc.jenis==="RETRIBUSI" ? `
                <div class="hr"></div>
                <div class="muted">Subtotal per section (aktif)</div>
                <div id="sumSections" style="margin-top:6px; display:grid; gap:6px"></div>
              ` : ``}
            </div>
            <div class="hr"></div>
            <div class="muted">Penandatangan bisa diubah di Settings.</div>
          </div>
        </div>
      </div>
    </div>
  `;

  window.__DOC__ = doc;

  el("jenis").addEventListener("change", ()=>{
    doc.jenis = el("jenis").value;
    renderFormArea();
    refreshTotals();
  });
  el("tglTrans").addEventListener("change", ()=>{
    doc.tanggalTransaksi = el("tglTrans").value;
  });
  el("tglTTD").addEventListener("change", ()=>{
    doc.tanggalTTD = el("tglTTD").value;
  });

  renderFormArea();
  refreshTotals();
}

function renderFormArea(){
  const doc=window.__DOC__;
  const area=el("formArea");

  if(doc.jenis==="LAINNYA"){
    area.innerHTML=`
      <div class="section">
        <div class="shd">
          <div><b>STSU Pendapatan Lainnya</b><div class="muted">uraian + nominal</div></div>
        </div>
        <div style="padding:12px">
          <div class="row">
            <div>
              <label>Uraian</label>
              <textarea id="uraian" placeholder="Isi uraian sesuai kebutuhan">${escapeHtml(doc.uraian||"")}</textarea>
            </div>
            <div class="row two">
              <div>
                <label>Nominal</label>
                <input id="nominalL" inputmode="numeric" value="${doc.nominalLainnya||0}" placeholder="0">
              </div>
              <div>
                <label>Info</label>
                <input value="Terbilang selalu ditampilkan di preview" disabled>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
    el("uraian").addEventListener("input", ()=>{ doc.uraian = el("uraian").value; });
    el("nominalL").addEventListener("input", ()=>{
      doc.nominalLainnya = numOnly(el("nominalL").value);
      el("nominalL").value = doc.nominalLainnya;
      refreshTotals();
    });
    return;
  }

  // Retribusi: sections + add custom section
  area.innerHTML=`
    <div class="inline no-print" style="justify-content:space-between">
      <div class="muted">Section bisa ditambah custom (mis: Retribusi Juru Foto, Retribusi Foto, dll).</div>
      <button class="btn small primary" onclick="addCustomSection()">+ Tambah Section</button>
    </div>
    ${doc.sections.map((s)=>renderSectionUI(s)).join("")}
  `;

  // wire handlers
  doc.sections.forEach((s)=>{
    // toggle
    const sw=el(`sw_${s.id}`);
    sw.addEventListener("click", ()=>{
      s.enabled = !s.enabled;
      renderFormArea();
      refreshTotals();
    });

    // rename title
    const titleInput = el(`title_${s.id}`);
    if(titleInput){
      titleInput.addEventListener("input", ()=>{
        s.title = titleInput.value;
        refreshTotals();
      });
    }

    // add row
    el(`add_${s.id}`).addEventListener("click", ()=>{
      s.items.push({kategori:"", nominal:0});
      renderFormArea();
      refreshTotals();
    });

    // delete section (only for custom)
    const delSec = el(`delsec_${s.id}`);
    if(delSec){
      delSec.addEventListener("click", ()=>{
        if(!confirm("Hapus section ini?")) return;
        const doc=window.__DOC__;
        doc.sections = doc.sections.filter(x=>x.id!==s.id);
        renderFormArea();
        refreshTotals();
      });
    }

    // rows
    s.items.forEach((it,rIdx)=>{
      const k=el(`k_${s.id}_${rIdx}`);
      const n=el(`n_${s.id}_${rIdx}`);
      if(k) k.addEventListener("input", ()=>{ it.kategori = k.value; });
      if(n) n.addEventListener("input", ()=>{
        it.nominal = numOnly(n.value);
        n.value = it.nominal;
        refreshTotals();
      });
      const del=el(`del_${s.id}_${rIdx}`);
      if(del) del.addEventListener("click", ()=>{
        s.items.splice(rIdx,1);
        renderFormArea();
        refreshTotals();
      });
    });
  });
}

function renderSectionUI(section){
  const enabled=section.enabled;
  const swClass=enabled?"switch on":"switch";
  const bodyStyle=enabled?"":"style='display:none'";
  const rows=section.items||[];
  const isCustom = (section.key||"") === "custom";
  const subtotal = sectionSubtotal(section);

  return `
    <div class="section">
      <div class="shd">
        <div style="min-width:0;flex:1">
          ${isCustom ? `
            <input id="title_${section.id}" value="${escapeHtml(section.title)}" style="font-weight:800" />
          ` : `
            <b>${escapeHtml(section.title)}</b>
          `}
          <div class="muted">${escapeHtml(section.note||"")}</div>
        </div>
        <div class="inline no-print" style="gap:8px">
          ${isCustom ? `<button class="btn small danger" id="delsec_${section.id}">Hapus Section</button>` : ``}
          <div class="muted">${enabled?"Aktif":"Nonaktif"}</div>
          <div id="sw_${section.id}" class="${swClass}" title="Toggle"></div>
        </div>
      </div>

      <div ${bodyStyle} style="padding:10px 12px">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:60%">Kategori</th>
              <th class="right" style="width:30%">Nominal</th>
              <th class="no-print" style="width:10%"></th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((it,rIdx)=>`
              <tr>
                <td><input id="k_${section.id}_${rIdx}" value="${escapeHtml(it.kategori||"")}" placeholder="Kategori"></td>
                <td class="right"><input id="n_${section.id}_${rIdx}" inputmode="numeric" value="${Number(it.nominal||0)}" placeholder="0"></td>
                <td class="no-print right"><button class="btn small danger" id="del_${section.id}_${rIdx}">Hapus</button></td>
              </tr>
            `).join("")}
            ${rows.length===0 ? `<tr><td colspan="3" class="muted">Belum ada item. Klik “Tambah baris”.</td></tr>` : ``}
          </tbody>
        </table>

        <div style="display:flex;justify-content:space-between;gap:10px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px dashed #cbd5e1">
          <b>Subtotal ${escapeHtml(section.title)}</b>
          <b>${rupiah(subtotal)}</b>
        </div>

        <div class="inline no-print" style="justify-content:flex-end;margin-top:10px">
          <button class="btn small" id="add_${section.id}">+ Tambah baris</button>
        </div>
      </div>
    </div>
  `;
}

function addCustomSection(){
  const doc=window.__DOC__;
  const mode = prompt("Tambah Section Custom:\nKetik 1 = Kosong\nKetik 2 = Copy template e-ticketing", "1");
  const items = (mode==="2") ? makeTemplateItems() : [];
  // custom dimasukkan setelah fasilitas, agar terlihat di atas e-ticketing di form juga
  const idxF = doc.sections.findIndex(s => (s.key||"")==="fasilitas");
  const newSec = {
    id: crypto.randomUUID(),
    key: "custom",
    title: "Section Baru (ubah nama)",
    note: "custom (bisa juru foto / foto / dll)",
    enabled: true,
    items
  };
  if(idxF>=0) doc.sections.splice(idxF+1, 0, newSec);
  else doc.sections.unshift(newSec);

  renderFormArea();
  refreshTotals();
}

function refreshTotals(){
  const doc=window.__DOC__;
  doc.total = computeTotal(doc);
  if(el("sumTotal")) el("sumTotal").textContent = rupiah(doc.total);
  if(el("sumTerbilang")) el("sumTerbilang").textContent = terbilangID(doc.total);

  if(doc.jenis==="RETRIBUSI" && el("sumSections")){
    el("sumSections").innerHTML = doc.sections
      .filter(s=>s.enabled)
      .map(s=>`<div class="totline"><div class="muted">${escapeHtml(s.title)}</div><span>${rupiah(sectionSubtotal(s))}</span></div>`)
      .join("");
  }
}

/* Actions */
function saveDoc(){
  const doc=window.__DOC__;
  const db=loadDB();
  const settings=loadSettings();

  if(!doc.tanggalTransaksi){
    alert("Tanggal Transaksi wajib diisi.");
    return;
  }

  // nomor dibuat saat simpan pertama (berdasarkan tanggal transaksi)
  if(!doc.nomor){
    doc.nomor = nextNumber(doc.jenis, doc.tanggalTransaksi);
  }

  // copy signers from settings if missing
  if(!doc.signers) doc.signers = JSON.parse(JSON.stringify(settings.signers));

  doc.total = computeTotal(doc);
  doc.updatedAt = Date.now();

  const idx=db.items.findIndex(x=>x.id===doc.id);
  if(idx>=0) db.items[idx]=doc; else db.items.push(doc);
  saveDB(db);

  alert("Tersimpan ✅");
  STATE.editingId = doc.id;
  render();
}

function finalizeDoc(){
  const doc=window.__DOC__;
  if(!doc.nomor){
    alert("Simpan dulu agar nomor STSU terbentuk.");
    return;
  }
  if(!doc.tanggalTTD){
    alert("Isi dulu Tanggal STSU/TTD sebelum Final.");
    return;
  }
  doc.status="FINAL";
  saveDoc();
}

function editDoc(id){
  STATE.route="buat";
  STATE.editingId=id;
  render();
}
function deleteDoc(id){
  if(!confirm("Hapus dokumen ini?")) return;
  const db=loadDB();
  db.items = db.items.filter(x=>x.id!==id);
  saveDB(db);
  render();
}
function openPreview(id){
  STATE.route="preview";
  STATE.previewId=id;
  render();
}
function openPreviewCurrent(){
  const doc=window.__DOC__;
  if(!doc.nomor){
    alert("Simpan dulu agar nomor STSU terbentuk.");
    return;
  }
  saveDoc();
  STATE.route="preview";
  STATE.previewId=doc.id;
  render();
}

/* Preview */
function renderPreview(app){
  const db=loadDB();
  const doc=db.items.find(x=>x.id===STATE.previewId);
  if(!doc){
    app.innerHTML=`<div class="card"><div class="bd">Dokumen tidak ditemukan. <button class="btn" onclick="go('dashboard')">Kembali</button></div></div>`;
    return;
  }

  const total=doc.total||0;

  // Penutup Retribusi sesuai foto: hari + tanggal transaksi + No STSU + nominal
  const penutupRetribusi = `
    Disetor uang kebendahara penerimaan hasil retribusi layanan masuk tempat rekreasi dan pemakaian fasilitas TMR
    pada hari ${escapeHtml(dayNameID(doc.tanggalTransaksi))} tanggal ${escapeHtml(ymdToIndo(doc.tanggalTransaksi))}
    dengan STSU No. ${escapeHtml(doc.nomor)} dengan uang sebesar ${rupiah(total)}
  `.replace(/\s+/g," ").trim();

  app.innerHTML=`
    <div class="no-print inline" style="justify-content:space-between">
      <div class="muted">Preview Surat A4 • Target maksimal 2 halaman</div>
      <div class="inline">
        <button class="btn" onclick="go('dashboard')">Kembali</button>
        <button class="btn" onclick="editDoc('${doc.id}')">Edit</button>
        <button class="btn primary" onclick="window.print()">Cetak / Simpan PDF</button>
      </div>
    </div>

    <div class="card surat" style="margin-top:12px">
      <div class="bd">
        <h1>SURAT TANDA SETOR UANG</h1>
        <div class="nomor">No: ${escapeHtml(doc.nomor||"")}</div>

        ${doc.jenis==="LAINNYA" ? `
          <div class="p">${escapeHtml(doc.uraian||"")}</div>

          <div class="total">
            <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px">
              <b>JUMLAH TOTAL</b>
              <b>${rupiah(total)}</b>
            </div>
            <div class="p" style="margin:8px 0 0;font-size:12.6px">
              <b>Terbilang :</b> ${escapeHtml(terbilangID(total))}
            </div>
          </div>
        ` : `
          ${renderSuratSectionsWithSubtotal(doc)}

          <div class="total">
            <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px">
              <b>JUMLAH TOTAL</b>
              <b>${rupiah(total)}</b>
            </div>
            <div class="p" style="margin:8px 0 0;font-size:12.6px">
              <b>Terbilang :</b> ${escapeHtml(terbilangID(total))}
            </div>
          </div>

          <div class="p" style="margin-top:18px">${escapeHtml(penutupRetribusi)}</div>
        `}

        <div class="p" style="text-align:right;margin-top:12px">
          Jakarta, ${escapeHtml(ymdToIndo(doc.tanggalTTD))}
        </div>

        <div class="ttdgrid">
          <div class="ttd">
            ${escapeHtml(doc.signers?.kepala?.jabatan || "Kepala Seksi")}
            <div class="spacer"></div>
            <b style="text-decoration:underline;text-underline-offset:4px">${escapeHtml(doc.signers?.kepala?.nama || "")}</b>
          </div>
          <div class="ttd">
            ${escapeHtml(doc.signers?.bendahara?.jabatan || "Bendahara Penerimaan")}
            <div class="spacer"></div>
            <b style="text-decoration:underline;text-underline-offset:4px">${escapeHtml(doc.signers?.bendahara?.nama || "")}</b>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSuratSectionsWithSubtotal(doc){
  // Urutan: fasilitas -> custom -> eticket -> online -> vending -> newgate -> susulan -> lainnya
  const orderRank = (s)=>{
    const k = (s.key||"").toLowerCase();
    if(k==="fasilitas") return 10;
    if(k==="custom") return 20;
    if(k==="eticket") return 30;
    if(k==="online") return 40;
    if(k==="vending") return 50;
    if(k==="newgate") return 60;
    if(k==="susulan") return 70;
    return 999;
  };

  const sections = [...(doc.sections||[])].sort((a,b)=>{
    const ra=orderRank(a), rb=orderRank(b);
    if(ra!==rb) return ra-rb;
    return (doc.sections||[]).indexOf(a) - (doc.sections||[]).indexOf(b);
  });

  const parts=[];
  sections.forEach(s=>{
    if(!s.enabled) return;

    const rows=(s.items||[])
      .filter(it=>Number(it.nominal||0)!==0)
      .filter(it=>(it.kategori||"").trim()!=="");
    if(rows.length===0) return;

    const sub = sum(rows.map(it=>Number(it.nominal||0)));

    parts.push(`
      <div class="p" style="margin-bottom:4px">
        <b>${escapeHtml(s.title)}</b>
      </div>

      <table class="tabel">
        ${rows.map(it=>`
          <tr>
            <td>${escapeHtml(it.kategori)}</td>
            <td class="r">${rupiah(it.nominal||0)}</td>
          </tr>
        `).join("")}
      </table>

      <div class="subline">
        <div class="left">Subtotal ${escapeHtml(s.title)} -----</div>
        <div class="right">${rupiah(sub)}</div>
      </div>
    `);
  });

  return parts.join("");
}

/* Settings */
function renderSettings(app){
  const s=loadSettings();
  app.innerHTML=`
    <div class="grid two">
      <div class="card">
        <div class="hd">
          <div>
            <h2>Settings</h2>
            <p>Ubah penandatangan (dinamis).</p>
          </div>
        </div>
        <div class="bd">
          <div class="section">
            <div class="shd"><div><b>Penandatangan</b><div class="muted">editable</div></div></div>
            <div style="padding:12px">
              <div class="row two">
                <div>
                  <label>Kepala Seksi - Nama</label>
                  <input id="ks_nama" value="${escapeHtml(s.signers.kepala.nama)}">
                </div>
                <div>
                  <label>Kepala Seksi - Jabatan</label>
                  <input id="ks_jab" value="${escapeHtml(s.signers.kepala.jabatan)}">
                </div>
              </div>
              <div class="row two" style="margin-top:10px">
                <div>
                  <label>Bendahara - Nama</label>
                  <input id="bd_nama" value="${escapeHtml(s.signers.bendahara.nama)}">
                </div>
                <div>
                  <label>Bendahara - Jabatan</label>
                  <input id="bd_jab" value="${escapeHtml(s.signers.bendahara.jabatan)}">
                </div>
              </div>
              <div class="inline no-print" style="justify-content:flex-end;margin-top:12px">
                <button class="btn" onclick="go('dashboard')">Kembali</button>
                <button class="btn primary" onclick="saveSigners()">Simpan</button>
              </div>
            </div>
          </div>

          <div class="hr"></div>
          <div class="inline no-print" style="justify-content:flex-end">
            <button class="btn danger" onclick="resetAll()">Reset Semua Data Lokal</button>
          </div>
          <div class="muted" style="margin-top:8px">Reset akan menghapus data STSU & counter di perangkat ini.</div>
        </div>
      </div>

      <div class="rightbox">
        <div class="card">
          <div class="hd"><div><h3>Catatan</h3><p>Versi GitHub Pages</p></div></div>
          <div class="bd">
            <div class="muted">Sekarang penyimpanan masih localStorage (per browser). Kalau sudah fix, kita pindah ke Firebase agar data aman dan bisa multi-user.</div>
          </div>
        </div>
      </div>
    </div>
  `;
}
function saveSigners(){
  const s=loadSettings();
  s.signers.kepala.nama = el("ks_nama").value.trim();
  s.signers.kepala.jabatan = el("ks_jab").value.trim();
  s.signers.bendahara.nama = el("bd_nama").value.trim();
  s.signers.bendahara.jabatan = el("bd_jab").value.trim();
  saveSettings(s);
  alert("Settings tersimpan ✅");
  go("dashboard");
}
function resetAll(){
  if(!confirm("Reset semua data lokal?")) return;
  localStorage.removeItem("stsu_db");
  localStorage.removeItem("stsu_counters");
  localStorage.removeItem("stsu_settings");
  alert("Sudah direset.");
  go("dashboard");
}

/* Init */
render();
</script>
</body>
</html>
