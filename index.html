<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STSU Digital</title>
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --primary:#0f172a;
      --primary2:#111827;
      --ok:#16a34a;
      --warn:#f59e0b;
      --shadow:0 10px 25px rgba(2,8,23,.08);
      --radius:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background:var(--bg);
      color:var(--text);
    }
    a{color:inherit}
    .wrap{max-width:1100px;margin:0 auto;padding:18px}
    .topbar{
      position:sticky;top:0;z-index:20;
      background:rgba(255,255,255,.86);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--border);
    }
    .topbar .inner{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 18px;max-width:1100px;margin:0 auto}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{
      width:38px;height:38px;border-radius:12px;background:var(--primary);
      color:white;display:flex;align-items:center;justify-content:center;font-weight:800;
    }
    .brand .title{line-height:1.15}
    .brand .title b{display:block;font-size:14px}
    .brand .title span{display:block;font-size:12px;color:var(--muted)}
    .nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    .btn{
      appearance:none;border:1px solid var(--border);
      background:#fff;color:var(--text);
      padding:9px 12px;border-radius:12px;
      font-size:13px;font-weight:600;cursor:pointer;
      display:inline-flex;align-items:center;gap:8px;
    }
    .btn:hover{background:#f8fafc}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.primary:hover{background:var(--primary2)}
    .btn.ghost{background:transparent}
    .btn.danger{border-color:#fecaca;background:#fff;color:#b91c1c}
    .btn.small{padding:7px 10px;border-radius:10px;font-size:12px}
    .grid{
      display:grid;gap:14px;
    }
    .grid.two{grid-template-columns: 1fr}
    @media (min-width: 900px){
      .grid.two{grid-template-columns: 1.35fr .65fr}
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .card .hd{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .card .hd h2,.card .hd h3{margin:0;font-size:15px}
    .card .hd p{margin:4px 0 0 0;font-size:12px;color:var(--muted)}
    .card .bd{padding:14px 16px}
    .row{display:grid;gap:10px}
    .row.two{grid-template-columns:1fr}
    @media(min-width:700px){.row.two{grid-template-columns:1fr 1fr}}
    label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px}
    input, select, textarea{
      width:100%;
      padding:10px 12px;
      border:1px solid var(--border);
      border-radius:12px;
      outline:none;
      font-size:14px;
      background:#fff;
    }
    textarea{min-height:92px;resize:vertical}
    input:focus, select:focus, textarea:focus{border-color:#94a3b8;box-shadow:0 0 0 3px rgba(148,163,184,.25)}
    .muted{color:var(--muted);font-size:12px}
    .badge{
      display:inline-flex;align-items:center;
      font-size:12px;font-weight:700;
      padding:3px 10px;border-radius:999px;
      border:1px solid var(--border);
      background:#f8fafc;
    }
    .badge.final{background:#ecfdf5;border-color:#bbf7d0;color:#166534}
    .badge.draft{background:#f1f5f9;border-color:#e2e8f0;color:#334155}
    .section{
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      background:#fff;
      margin-top:12px;
    }
    .section .shd{
      padding:10px 12px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:#f8fafc;
      border-bottom:1px solid var(--border);
    }
    .section .shd b{font-size:13px}
    .toggle{
      display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);user-select:none;
    }
    .switch{
      width:44px;height:26px;border-radius:999px;background:#e2e8f0;position:relative;cursor:pointer;flex:0 0 auto;
      border:1px solid #cbd5e1;
    }
    .switch::after{
      content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:999px;background:#fff;box-shadow:0 3px 10px rgba(0,0,0,.15);
      transition:all .18s ease;
    }
    .switch.on{background:#16a34a;border-color:#16a34a}
    .switch.on::after{left:21px}
    .tbl{
      width:100%;
      border-collapse:collapse;
    }
    .tbl th,.tbl td{
      border-top:1px solid var(--border);
      padding:10px 10px;
      font-size:13px;
      vertical-align:middle;
    }
    .tbl th{background:#fff;text-align:left;color:var(--muted);font-size:12px}
    .tbl td.right{text-align:right}
    .inline{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .totbox{
      border:1px dashed #cbd5e1;
      border-radius:14px;
      padding:12px;
      background:#fafcff;
    }
    .totline{display:flex;justify-content:space-between;gap:10px;align-items:flex-end}
    .totline b{font-size:16px}
    .totline span{font-variant-numeric: tabular-nums;}
    .hr{height:1px;background:var(--border);margin:12px 0}
    .rightbox .card{position:sticky;top:76px}
    .foot-actions{display:flex;gap:8px;flex-wrap:wrap}

    /* Print */
    @media print{
      .no-print{display:none !important}
      body{background:#fff}
      .wrap{max-width:none;padding:0}
      .card{border:none;box-shadow:none;border-radius:0}
      .section{border:1px solid #cbd5e1}
    }
    @page{size:A4;margin:20mm}
    .surat{
      padding:0;
    }
    .surat h1{
      text-align:center;
      font-size:15px;
      letter-spacing:.6px;
      margin:0;
    }
    .surat .nomor{ text-align:center; margin-top:6px; font-size:13px}
    .surat .p{font-size:13px;line-height:1.55;margin:12px 0}
    .surat .tabel{width:100%;border-collapse:collapse;margin-top:6px}
    .surat .tabel td{border-top:1px solid #cbd5e1;padding:7px 8px;font-size:13px}
    .surat .tabel td.r{text-align:right;font-variant-numeric:tabular-nums;}
    .surat .total{border-top:1px solid #0f172a;margin-top:12px;padding-top:10px}
    .surat .ttdgrid{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:36px}
    .surat .ttd{text-align:center;font-size:13px}
    .surat .spacer{height:70px}
  </style>
</head>
<body>
  <div class="topbar no-print">
    <div class="inner">
      <div class="brand">
        <div class="logo">SU</div>
        <div class="title">
          <b>Sistem STSU Digital</b>
          <span>TMR • Modern tapi tetap resmi</span>
        </div>
      </div>
      <div class="nav">
        <button class="btn" onclick="go('dashboard')">Dashboard</button>
        <button class="btn" onclick="go('buat')">Buat STSU</button>
        <button class="btn" onclick="go('settings')">Settings</button>
      </div>
    </div>
  </div>

  <div class="wrap" id="app"></div>

<script>
/* ===================== Utilities ===================== */
const MONTHS_ID = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];

function pad2(n){ return String(n).padStart(2,"0"); }
function rupiah(n){
  const v = Number(n||0);
  return new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(v);
}
function ymdToIndo(ymd){
  const [y,m,d]=ymd.split("-");
  return `${Number(d)} ${MONTHS_ID[Number(m)-1]} ${y}`;
}
function numOnly(v){ return Number(String(v||"0").replace(/[^\d]/g,""))||0; }
function sum(arr){ return arr.reduce((a,b)=>a+Number(b||0),0); }

/* Terbilang sederhana (cukup untuk produksi dasar) */
function terbilang(n){
  n = Math.floor(Number(n||0));
  if (n === 0) return "nol rupiah";
  const satuan = ["","satu","dua","tiga","empat","lima","enam","tujuh","delapan","sembilan","sepuluh","sebelas"];
  function t(x){
    x = Math.floor(x);
    if (x < 12) return satuan[x];
    if (x < 20) return t(x-10)+" belas";
    if (x < 100) return t(Math.floor(x/10))+" puluh"+(x%10?(" "+t(x%10)):"");
    if (x < 200) return "seratus"+(x-100?(" "+t(x-100)):"");
    if (x < 1000) return t(Math.floor(x/100))+" ratus"+(x%100?(" "+t(x%100)):"");
    if (x < 2000) return "seribu"+(x-1000?(" "+t(x-1000)):"");
    if (x < 1000000) return t(Math.floor(x/1000))+" ribu"+(x%1000?(" "+t(x%1000)):"");
    if (x < 1000000000) return t(Math.floor(x/1000000))+" juta"+(x%1000000?(" "+t(x%1000000)):"");
    if (x < 1000000000000) return t(Math.floor(x/1000000000))+" miliar"+(x%1000000000?(" "+t(x%1000000000)):"");
    return t(Math.floor(x/1000000000000))+" triliun"+(x%1000000000000?(" "+t(x%1000000000000)):"");
  }
  return (t(n) + " rupiah").replace(/\s+/g," ").trim();
}

/* ===================== Storage ===================== */
const LS = {
  get(k, d){ try{ const v = localStorage.getItem(k); return v? JSON.parse(v): d; }catch{ return d; } },
  set(k, v){ localStorage.setItem(k, JSON.stringify(v)); },
};

const STATE = {
  route: "dashboard",
  editingId: null,
  previewId: null,
};

const DEFAULT_SIGNERS = {
  kepala: { nama: "NAMA KEPALA SEKSI", jabatan: "Kepala Seksi Pelayanan & Informasi" },
  bendahara: { nama: "NAMA BENDAHARA", jabatan: "Bendahara Penerimaan" },
};

function loadSettings(){
  return LS.get("stsu_settings", { signers: DEFAULT_SIGNERS });
}
function saveSettings(s){ LS.set("stsu_settings", s); }

function loadDB(){
  return LS.get("stsu_db", { items: [] });
}
function saveDB(db){ LS.set("stsu_db", db); }

function loadCounters(){
  return LS.get("stsu_counters", { byYear: {} });
}
function saveCounters(c){ LS.set("stsu_counters", c); }

/* ===================== Templates ===================== */
const TEMPLATE_ITEMS_ETICKETING = [
  "Dewasa","Anak","Rombongan Dewasa","Rombongan Anak","Taman Satwa Anak","Pusat Primata",
  "H. Biasa Dewasa","H. Biasa Anak","Kendaraan Gol 1","Kendaraan Gol 2","Kendaraan Gol 3","Motor","Sepeda"
];

const DEFAULT_SECTIONS = [
  { key:"fasilitas", title:"Pemakaian Fasilitas", enabled:true, items:[] }, // fleksibel (awal kosong)
  { key:"eticket", title:"E-ticketing", enabled:true, items:TEMPLATE_ITEMS_ETICKETING.map(k=>({kategori:k, nominal:0})) },
  { key:"online", title:"Tiket Online", enabled:true, items:TEMPLATE_ITEMS_ETICKETING.map(k=>({kategori:k, nominal:0})) },
  { key:"vending", title:"Vending Machine", enabled:true, items:TEMPLATE_ITEMS_ETICKETING.map(k=>({kategori:k, nominal:0})) },
  { key:"newgate", title:"New Gate", enabled:true, items:TEMPLATE_ITEMS_ETICKETING.map(k=>({kategori:k, nominal:0})) },
  { key:"susulan", title:"Susulan / Validasi", enabled:true, items:TEMPLATE_ITEMS_ETICKETING.map(k=>({kategori:k, nominal:0})) },
];

/* ===================== Numbering ===================== */
/* Pisah counter per tahun & jenis. Tanpa 0 depan. */
function nextNumber(jenis, tanggalYMD){
  const year = tanggalYMD.slice(0,4);
  const c = loadCounters();
  if(!c.byYear[year]) c.byYear[year] = { RETRIBUSI:0, LAINNYA:0 };
  c.byYear[year][jenis] = (c.byYear[year][jenis]||0) + 1;
  saveCounters(c);
  const n = c.byYear[year][jenis];

  const dd = tanggalYMD.slice(8,10);
  const mm = tanggalYMD.slice(5,7);

  if(jenis === "RETRIBUSI"){
    return `${n}/${dd}/${mm}/SU/${year}`;
  }
  return `${n}/${dd}/${mm}/SU/L/${year}`;
}

/* ===================== UI Rendering ===================== */
function go(route){
  STATE.route = route;
  STATE.editingId = null;
  STATE.previewId = null;
  render();
}

function el(id){ return document.getElementById(id); }

function render(){
  const app = el("app");
  if(STATE.route === "dashboard") return renderDashboard(app);
  if(STATE.route === "buat") return renderBuat(app);
  if(STATE.route === "settings") return renderSettings(app);
  if(STATE.route === "preview") return renderPreview(app);
}

/* Dashboard */
function renderDashboard(app){
  const db = loadDB();
  const items = [...db.items].sort((a,b)=> (b.createdAt||0) - (a.createdAt||0));

  app.innerHTML = `
    <div class="grid two">
      <div class="card">
        <div class="hd">
          <div>
            <h2>Dashboard</h2>
            <p>Daftar STSU tersimpan (lokal browser). Nanti bisa disambung ke Firebase.</p>
          </div>
          <span class="badge">${items.length} dokumen</span>
        </div>
        <div class="bd">
          <div class="inline no-print" style="justify-content:space-between">
            <div class="muted">Tip: klik “Preview” untuk cetak PDF.</div>
            <button class="btn primary" onclick="go('buat')">+ Buat STSU</button>
          </div>

          <div style="margin-top:12px; overflow:auto">
            <table class="tbl">
              <thead>
                <tr>
                  <th>Nomor</th>
                  <th>Tanggal</th>
                  <th>Jenis</th>
                  <th class="right">Total</th>
                  <th>Status</th>
                  <th class="no-print">Aksi</th>
                </tr>
              </thead>
              <tbody>
                ${items.length ? items.map(x=>`
                  <tr>
                    <td><b>${escapeHtml(x.nomor)}</b></td>
                    <td>${escapeHtml(ymdToIndo(x.tanggalSTSU))}</td>
                    <td><span class="badge">${escapeHtml(x.jenis)}</span></td>
                    <td class="right">${rupiah(x.total)}</td>
                    <td>${x.status === "FINAL" ? `<span class="badge final">FINAL</span>` : `<span class="badge draft">DRAFT</span>`}</td>
                    <td class="no-print">
                      <button class="btn small" onclick="editDoc('${x.id}')">Edit</button>
                      <button class="btn small" onclick="openPreview('${x.id}')">Preview</button>
                      <button class="btn small danger" onclick="deleteDoc('${x.id}')">Hapus</button>
                    </td>
                  </tr>
                `).join("") : `
                  <tr><td colspan="6" class="muted" style="padding:14px">Belum ada data. Klik “Buat STSU”.</td></tr>
                `}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="rightbox">
        <div class="card">
          <div class="hd">
            <div>
              <h3>Ringkasan</h3>
              <p>Otomatis dari data tersimpan</p>
            </div>
          </div>
          <div class="bd">
            ${renderSummary(items)}
            <div class="hr"></div>
            <div class="muted">Catatan: saat ini data tersimpan di browser (localStorage). Setelah UI fix, baru kita sambungkan ke Firebase untuk multi-user.</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSummary(items){
  const totalR = sum(items.filter(x=>x.jenis==="RETRIBUSI").map(x=>x.total));
  const totalL = sum(items.filter(x=>x.jenis==="LAINNYA").map(x=>x.total));
  const total = totalR + totalL;
  return `
    <div class="totbox">
      <div class="totline"><div class="muted">Total Retribusi</div><span>${rupiah(totalR)}</span></div>
      <div class="totline" style="margin-top:6px"><div class="muted">Total Lainnya</div><span>${rupiah(totalL)}</span></div>
      <div class="hr"></div>
      <div class="totline"><b>Total Keseluruhan</b><b>${rupiah(total)}</b></div>
    </div>
  `;
}

/* Buat/Edit */
function renderBuat(app){
  const settings = loadSettings();
  const db = loadDB();
  let doc = null;

  if(STATE.editingId){
    doc = db.items.find(x=>x.id===STATE.editingId) || null;
  }

  // default new doc
  if(!doc){
    doc = {
      id: crypto.randomUUID(),
      jenis: "RETRIBUSI",
      tanggalSTSU: new Date().toISOString().slice(0,10),
      status: "DRAFT",
      nomor: "",
      uraian: "",
      nominalLainnya: 0,
      sections: JSON.parse(JSON.stringify(DEFAULT_SECTIONS)),
      signers: JSON.parse(JSON.stringify(settings.signers)),
      createdAt: Date.now(),
      updatedAt: Date.now(),
    };
  }

  // compute total
  doc.total = computeTotal(doc);

  app.innerHTML = `
    <div class="grid two">
      <div class="card">
        <div class="hd">
          <div>
            <h2>${STATE.editingId ? "Edit STSU" : "Buat STSU"}</h2>
            <p>Jenis Retribusi/Lainnya, nomor otomatis, preview A4 siap cetak.</p>
          </div>
          <span class="badge ${doc.status==="FINAL"?"final":"draft"}">${doc.status}</span>
        </div>
        <div class="bd">
          <div class="row two">
            <div>
              <label>Jenis</label>
              <select id="jenis">
                <option value="RETRIBUSI" ${doc.jenis==="RETRIBUSI"?"selected":""}>Retribusi</option>
                <option value="LAINNYA" ${doc.jenis==="LAINNYA"?"selected":""}>Lainnya</option>
              </select>
            </div>
            <div>
              <label>Tanggal STSU</label>
              <input id="tanggalSTSU" type="date" value="${doc.tanggalSTSU}">
            </div>
          </div>

          <div class="row" style="margin-top:10px">
            <div class="muted">Nomor dibuat saat klik <b>Simpan</b> pertama kali. (Counter pisah Retribusi/Lainnya, reset per tahun)</div>
          </div>

          <div id="formArea" style="margin-top:6px"></div>

          <div class="hr"></div>
          <div class="foot-actions no-print">
            <button class="btn" onclick="go('dashboard')">Kembali</button>
            <button class="btn primary" onclick="saveDoc()">Simpan</button>
            <button class="btn" onclick="openPreviewCurrent()">Preview</button>
            <button class="btn danger" onclick="finalizeDoc()">Finalkan</button>
          </div>
        </div>
      </div>

      <div class="rightbox">
        <div class="card">
          <div class="hd">
            <div>
              <h3>Ringkasan</h3>
              <p>Total & terbilang otomatis</p>
            </div>
          </div>
          <div class="bd">
            <div class="totbox">
              <div class="totline"><div class="muted">Total</div><b id="sumTotal">${rupiah(doc.total)}</b></div>
              <div class="hr"></div>
              <div class="muted">Terbilang</div>
              <div style="margin-top:6px;font-size:13px;line-height:1.45"><i id="sumTerbilang">${escapeHtml(terbilang(doc.total))}</i></div>
            </div>
            <div class="hr"></div>
            <div class="muted">Penandatangan mengikuti Settings dan disalin ke dokumen saat disimpan (arsip aman walau pejabat berubah).</div>
          </div>
        </div>
      </div>
    </div>
  `;

  // Keep draft doc in memory for interactions
  window.__DOC__ = doc;

  // wire events
  el("jenis").addEventListener("change", ()=>{
    window.__DOC__.jenis = el("jenis").value;
    renderFormArea();
    refreshTotals();
  });
  el("tanggalSTSU").addEventListener("change", ()=>{
    window.__DOC__.tanggalSTSU = el("tanggalSTSU").value;
  });

  renderFormArea();
}

function renderFormArea(){
  const doc = window.__DOC__;
  const area = el("formArea");

  if(doc.jenis === "LAINNYA"){
    area.innerHTML = `
      <div class="section">
        <div class="shd">
          <b>STSU Pendapatan Lainnya</b>
          <span class="muted">uraian + nominal</span>
        </div>
        <div style="padding:12px">
          <div class="row">
            <div>
              <label>Uraian</label>
              <textarea id="uraian" placeholder="Isi uraian (bisa template/manual)">${escapeHtml(doc.uraian||"")}</textarea>
              <div class="muted">Contoh: Disetor uang ke Bendahara Penerimaan hasil pendapatan lainnya ...</div>
            </div>
            <div class="row two">
              <div>
                <label>Nominal</label>
                <input id="nominalL" inputmode="numeric" placeholder="0" value="${doc.nominalLainnya||0}">
              </div>
              <div>
                <label>Template (opsional)</label>
                <select id="templateL">
                  <option value="">— pilih (opsional) —</option>
                  <option value="a">Disetor uang ke Bendahara Penerimaan hasil pendapatan lainnya...</option>
                  <option value="b">Disetor uang pendapatan operasional (lainnya)...</option>
                </select>
              </div>
            </div>
          </div>
          <div class="inline no-print" style="justify-content:flex-end;margin-top:10px">
            <button class="btn small" onclick="applyTemplate()">Pakai Template</button>
          </div>
        </div>
      </div>
    `;

    el("uraian").addEventListener("input", ()=>{ doc.uraian = el("uraian").value; });
    el("nominalL").addEventListener("input", ()=>{
      doc.nominalLainnya = numOnly(el("nominalL").value);
      el("nominalL").value = doc.nominalLainnya;
      refreshTotals();
    });

    return;
  }

  // Retribusi sections
  area.innerHTML = doc.sections.map((s, idx)=>renderSectionUI(s, idx)).join("");

  // attach handlers for each section
  doc.sections.forEach((s, idx)=>{
    // toggle
    const sw = el(`sw_${s.key}`);
    sw.addEventListener("click", ()=>{
      s.enabled = !s.enabled;
      renderFormArea();
      refreshTotals();
    });

    // add row
    const addBtn = el(`add_${s.key}`);
    addBtn.addEventListener("click", ()=>{
      s.items.push({ kategori:"", nominal:0 });
      renderFormArea();
      refreshTotals();
    });

    // row inputs
    s.items.forEach((it, rIdx)=>{
      const k = el(`k_${s.key}_${rIdx}`);
      const n = el(`n_${s.key}_${rIdx}`);
      if(k){
        k.addEventListener("input", ()=>{ it.kategori = k.value; });
      }
      if(n){
        n.addEventListener("input", ()=>{
          it.nominal = numOnly(n.value);
          n.value = it.nominal;
          refreshTotals();
        });
      }

      const del = el(`del_${s.key}_${rIdx}`);
      if(del){
        del.addEventListener("click", ()=>{
          s.items.splice(rIdx,1);
          renderFormArea();
          refreshTotals();
        });
      }
    });
  });
}

function renderSectionUI(section, idx){
  const enabled = section.enabled;
  const swClass = enabled ? "switch on" : "switch";
  const bodyStyle = enabled ? "" : "style='display:none'";
  const rows = section.items.length ? section.items : [];
  const isFasilitas = section.key === "fasilitas";

  return `
    <div class="section">
      <div class="shd">
        <div>
          <b>${escapeHtml(section.title)}</b>
          <div class="muted">${isFasilitas ? "fleksibel (sesuai pemakaian hari itu)" : "template sama seperti e-ticketing"}</div>
        </div>
        <div class="toggle no-print">
          <span>${enabled ? "Aktif" : "Nonaktif"}</span>
          <div id="sw_${section.key}" class="${swClass}" title="Toggle"></div>
        </div>
      </div>

      <div ${bodyStyle} style="padding:10px 12px">
        <table class="tbl">
          <thead>
            <tr>
              <th style="width:60%">Kategori</th>
              <th class="right" style="width:30%">Nominal</th>
              <th class="no-print" style="width:10%"></th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((it, rIdx)=>`
              <tr>
                <td><input id="k_${section.key}_${rIdx}" value="${escapeHtml(it.kategori||"")}" placeholder="Kategori"></td>
                <td class="right"><input id="n_${section.key}_${rIdx}" inputmode="numeric" value="${Number(it.nominal||0)}" placeholder="0"></td>
                <td class="no-print right">
                  <button class="btn small danger" id="del_${section.key}_${rIdx}" title="Hapus baris">Hapus</button>
                </td>
              </tr>
            `).join("")}
            ${rows.length===0 ? `<tr><td colspan="3" class="muted">Belum ada item. Klik “Tambah baris”.</td></tr>` : ""}
          </tbody>
        </table>

        <div class="inline no-print" style="justify-content:flex-end;margin-top:10px">
          <button class="btn small" id="add_${section.key}">+ Tambah baris</button>
        </div>
      </div>
    </div>
  `;
}

function computeTotal(doc){
  if(doc.jenis === "LAINNYA") return Number(doc.nominalLainnya||0);
  let total = 0;
  doc.sections.forEach(s=>{
    if(!s.enabled) return;
    s.items.forEach(it=>{
      const v = Number(it.nominal||0);
      total += v;
    });
  });
  return total;
}

function refreshTotals(){
  const doc = window.__DOC__;
  doc.total = computeTotal(doc);
  if(el("sumTotal")) el("sumTotal").textContent = rupiah(doc.total);
  if(el("sumTerbilang")) el("sumTerbilang").textContent = terbilang(doc.total);
}

/* Actions */
function applyTemplate(){
  const doc = window.__DOC__;
  const t = el("templateL").value;
  if(!t) return;
  const map = {
    a: "Disetor uang ke Bendahara Penerimaan hasil pendapatan lainnya, sbb:",
    b: "Disetor uang hasil pendapatan operasional (lainnya), tanggal ...",
  };
  doc.uraian = map[t] || doc.uraian;
  el("uraian").value = doc.uraian;
}

function saveDoc(){
  const doc = window.__DOC__;
  const db = loadDB();
  const settings = loadSettings();

  // ensure signers copied from settings if empty
  if(!doc.signers) doc.signers = JSON.parse(JSON.stringify(settings.signers));

  // assign number if first save
  if(!doc.nomor){
    doc.nomor = nextNumber(doc.jenis, doc.tanggalSTSU);
  }

  doc.total = computeTotal(doc);
  doc.updatedAt = Date.now();

  const idx = db.items.findIndex(x=>x.id===doc.id);
  if(idx>=0) db.items[idx] = doc;
  else db.items.push(doc);

  saveDB(db);
  alert("Tersimpan ✅");
  STATE.editingId = doc.id;
  render();
}

function finalizeDoc(){
  const doc = window.__DOC__;
  if(!confirm("Finalkan dokumen? Setelah final, tetap bisa diedit di versi ini, tapi nanti bisa kita kunci.")) return;
  doc.status = "FINAL";
  saveDoc();
}

function editDoc(id){
  STATE.route = "buat";
  STATE.editingId = id;
  render();
}

function deleteDoc(id){
  if(!confirm("Hapus dokumen ini?")) return;
  const db = loadDB();
  db.items = db.items.filter(x=>x.id!==id);
  saveDB(db);
  render();
}

function openPreview(id){
  STATE.route = "preview";
  STATE.previewId = id;
  render();
}

function openPreviewCurrent(){
  const doc = window.__DOC__;
  if(!doc.nomor){
    alert("Simpan dulu agar nomor dibuat otomatis.");
    return;
  }
  STATE.route = "preview";
  STATE.previewId = doc.id;
  // ensure it's saved so preview reads latest
  saveDoc();
}

/* Preview */
function renderPreview(app){
  const db = loadDB();
  const doc = db.items.find(x=>x.id===STATE.previewId);
  if(!doc){
    app.innerHTML = `<div class="card"><div class="bd">Dokumen tidak ditemukan. <button class="btn" onclick="go('dashboard')">Kembali</button></div></div>`;
    return;
  }

  const total = doc.total || 0;

  app.innerHTML = `
    <div class="no-print inline" style="justify-content:space-between">
      <div class="muted">Preview Surat A4 • Nominal 0 disembunyikan</div>
      <div class="inline">
        <button class="btn" onclick="go('dashboard')">Kembali</button>
        <button class="btn" onclick="editDoc('${doc.id}')">Edit</button>
        <button class="btn primary" onclick="window.print()">Cetak / Simpan PDF</button>
      </div>
    </div>

    <div class="card surat" style="margin-top:12px">
      <div class="bd">
        <h1>SURAT TANDA SETOR UANG</h1>
        <div class="nomor">No: ${escapeHtml(doc.nomor)}</div>

        ${doc.jenis==="LAINNYA" ? `
          <div class="p">${escapeHtml(doc.uraian || "Disetor uang ke Bendahara Penerimaan hasil pendapatan lainnya, sbb:")}</div>
          <div class="p"><b>${rupiah(doc.nominalLainnya||0)}</b></div>
          <div class="p">Terbilang: <i>${escapeHtml(terbilang(doc.nominalLainnya||0))}</i></div>
        ` : `
          <div class="p">Disetor uang ke Bendahara Penerimaan hasil pendapatan retribusi, dengan rincian sebagai berikut:</div>
          ${renderSuratSections(doc)}
          <div class="total">
            <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px">
              <b>JUMLAH TOTAL</b>
              <b>${rupiah(total)}</b>
            </div>
            <div class="p" style="margin:6px 0 0 0">Terbilang: <i>${escapeHtml(terbilang(total))}</i></div>
          </div>
        `}

        <div class="p" style="text-align:right;margin-top:18px">Jakarta, ${escapeHtml(ymdToIndo(doc.tanggalSTSU))}</div>

        <div class="ttdgrid">
          <div class="ttd">
            ${escapeHtml(doc.signers?.kepala?.jabatan || "Kepala Seksi")}
            <div class="spacer"></div>
            <b style="text-decoration:underline;text-underline-offset:4px">${escapeHtml(doc.signers?.kepala?.nama || "")}</b>
          </div>
          <div class="ttd">
            ${escapeHtml(doc.signers?.bendahara?.jabatan || "Bendahara Penerimaan")}
            <div class="spacer"></div>
            <b style="text-decoration:underline;text-underline-offset:4px">${escapeHtml(doc.signers?.bendahara?.nama || "")}</b>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderSuratSections(doc){
  const parts = [];
  doc.sections.forEach(s=>{
    if(!s.enabled) return;
    const rows = (s.items||[])
      .filter(it => Number(it.nominal||0) !== 0) // hide 0
      .filter(it => (it.kategori||"").trim() !== "");
    if(rows.length === 0) return;

    parts.push(`
      <div class="p" style="margin-bottom:6px"><b>${escapeHtml(s.title)}</b></div>
      <table class="tabel">
        ${rows.map(it=>`
          <tr>
            <td>${escapeHtml(it.kategori)}</td>
            <td class="r">${rupiah(it.nominal||0)}</td>
          </tr>
        `).join("")}
      </table>
    `);
  });
  return parts.join("");
}

/* Settings */
function renderSettings(app){
  const s = loadSettings();

  app.innerHTML = `
    <div class="grid two">
      <div class="card">
        <div class="hd">
          <div>
            <h2>Settings</h2>
            <p>Ubah penandatangan (dinamis). Berlaku untuk dokumen baru yang dibuat setelah perubahan.</p>
          </div>
        </div>
        <div class="bd">
          <div class="section">
            <div class="shd"><b>Penandatangan</b><span class="muted">editable</span></div>
            <div style="padding:12px">
              <div class="row two">
                <div>
                  <label>Kepala Seksi - Nama</label>
                  <input id="ks_nama" value="${escapeHtml(s.signers.kepala.nama)}">
                </div>
                <div>
                  <label>Kepala Seksi - Jabatan</label>
                  <input id="ks_jab" value="${escapeHtml(s.signers.kepala.jabatan)}">
                </div>
              </div>

              <div class="row two" style="margin-top:10px">
                <div>
                  <label>Bendahara - Nama</label>
                  <input id="bd_nama" value="${escapeHtml(s.signers.bendahara.nama)}">
                </div>
                <div>
                  <label>Bendahara - Jabatan</label>
                  <input id="bd_jab" value="${escapeHtml(s.signers.bendahara.jabatan)}">
                </div>
              </div>

              <div class="inline no-print" style="justify-content:flex-end;margin-top:12px">
                <button class="btn" onclick="go('dashboard')">Kembali</button>
                <button class="btn primary" onclick="saveSigners()">Simpan</button>
              </div>
            </div>
          </div>

          <div class="hr"></div>
          <div class="muted">Info: Saat ini aplikasi menyimpan data di browser (localStorage). Nanti jika sudah siap, kita sambungkan ke Firebase supaya multi-user dan data aman di cloud.</div>
        </div>
      </div>

      <div class="rightbox">
        <div class="card">
          <div class="hd"><div><h3>Tools</h3><p>Reset data lokal (opsional)</p></div></div>
          <div class="bd">
            <button class="btn danger" onclick="resetAll()">Reset Semua Data Lokal</button>
            <div class="muted" style="margin-top:10px">Hati-hati: ini menghapus data STSU dan counter di perangkat ini.</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function saveSigners(){
  const s = loadSettings();
  s.signers.kepala.nama = el("ks_nama").value.trim();
  s.signers.kepala.jabatan = el("ks_jab").value.trim();
  s.signers.bendahara.nama = el("bd_nama").value.trim();
  s.signers.bendahara.jabatan = el("bd_jab").value.trim();
  saveSettings(s);
  alert("Settings tersimpan ✅");
  go("dashboard");
}

function resetAll(){
  if(!confirm("Reset semua data lokal?")) return;
  localStorage.removeItem("stsu_db");
  localStorage.removeItem("stsu_counters");
  localStorage.removeItem("stsu_settings");
  alert("Sudah direset.");
  go("dashboard");
}

/* Helpers */
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/* Init */
render();
</script>
</body>
</html>
