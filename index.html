<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STSU Digital</title>
<style>
body{font-family:Arial;margin:20px;background:#f2f2f2}
.card{background:white;padding:20px;border-radius:12px;margin-bottom:15px}
button{padding:8px 12px;margin:5px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#2563eb;color:white}
.success{background:#16a34a;color:white}
.danger{background:#dc2626;color:white}
input{padding:8px;margin:5px;width:100%;box-sizing:border-box}
.hidden{display:none}
</style>
</head>
<body>

<div class="card" id="loginBox">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button class="primary" onclick="login()">Login</button>
<p id="loginMsg"></p>
</div>

<div class="card hidden" id="appBox">
<h3>Buat STSU</h3>
<input id="tanggal" type="date">
<input id="nominal" placeholder="Nominal (angka saja)">
<button class="success" onclick="saveData()">Simpan</button>
<button class="danger" onclick="logout()">Logout</button>
<p id="saveMsg"></p>
</div>

<div class="card hidden" id="dashBox">
<h3>Dashboard</h3>
<div id="list"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
import { getDatabase, ref, push, get } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDqIE0cumE-7RgK3XE5QIYyQLpzgl1nB8A",
  authDomain: "stsu-ee385.firebaseapp.com",
  databaseURL: "https://stsu-ee385-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "stsu-ee385",
  storageBucket: "stsu-ee385.firebasestorage.app",
  messagingSenderId: "415025124329",
  appId: "1:415025124329:web:bbfd49874ddf236d16b178"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.login = async function(){
  try{
    await signInWithEmailAndPassword(auth,
      document.getElementById("email").value,
      document.getElementById("pass").value
    );
  }catch(e){
    document.getElementById("loginMsg").innerText = e.message;
  }
}

window.logout = async function(){
  await signOut(auth);
}

window.saveData = async function(){
  const tgl = document.getElementById("tanggal").value;
  const nominal = Number(document.getElementById("nominal").value || 0);
  if(!tgl || nominal <= 0){
    document.getElementById("saveMsg").innerText = "Isi tanggal & nominal";
    return;
  }

  await push(ref(db,"stsu"),{
    uid: auth.currentUser.uid,
    tanggal: tgl,
    nominal: nominal,
    createdAt: Date.now()
  });

  document.getElementById("saveMsg").innerText = "Tersimpan ✅";
  loadDashboard();
}

async function loadDashboard(){
  const snap = await get(ref(db,"stsu"));
  const list = document.getElementById("list");
  list.innerHTML = "";
  if(snap.exists()){
    Object.values(snap.val()).forEach(d=>{
      list.innerHTML += `
        <div style="padding:8px;border-bottom:1px solid #ccc">
        ${d.tanggal} - Rp ${d.nominal.toLocaleString("id-ID")}
        </div>
      `;
    });
  }
}

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("appBox").classList.remove("hidden");
    document.getElementById("dashBox").classList.remove("hidden");
    loadDashboard();
  }else{
    document.getElementById("loginBox").classList.remove("hidden");
    document.getElementById("appBox").classList.add("hidden");
    document.getElementById("dashBox").classList.add("hidden");
  }
});
</script>

</body>
</html>
